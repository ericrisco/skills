skill: secure-coding

should_trigger:
  - prompt: "Can you do a security review of this diff before I merge? It adds a /documents/{id} GET endpoint in our FastAPI app."
    why: "Explicit security review of a diff touching an endpoint that returns an object by id — A01/IDOR territory, the skill's flagship. Pre-merge security pass is a core Use-when trigger."
  - prompt: "We're about to add a feature where users can paste a URL and our backend fetches it to generate a preview. What could go wrong?"
    why: "User-supplied URL into an outbound fetch is the SSRF (A10) trust-boundary crossing. 'What could go wrong' before coding is a threat-model request even though the user never says 'security' or 'SSRF'."
  - prompt: "Our login endpoint stores password hashes with SHA-256 and we generate reset tokens with Python's random module. Is that okay?"
    why: "Cryptographic failures (A02): fast hash for passwords + non-CSPRNG tokens. Asking 'is that okay' about auth crypto is a hardening request the skill owns (Argon2id + secrets)."
  - prompt: "Marketing wants me to add allow_origins=['*'] with credentials so the widget works everywhere. Set that up?"
    why: "CORS misconfiguration (A05) — wildcard origin with credentials. The user is asking to implement an insecure config; the skill must intercept and correct it rather than comply."
  - prompt: "Before we ship the avatar upload, I want to make sure someone can't upload a malicious file. It currently checks file.type and saves into /public."
    why: "Upload-to-disk boundary: trusting client content-type and storing in the web root. Non-obvious phrasing ('make sure someone can't upload a malicious file') but squarely the upload-validation guidance (magic-byte sniff, store outside web root)."
  - prompt: "I think we accidentally committed an API key to git last week. What's the right way to handle this?"
    why: "Secret exposure in repo — the skill's secrets/supply-chain runbook (rotate first, then scrub history, confirm with gitleaks). User doesn't name OWASP or 'security' but it's exactly the secrets concern."
  - prompt: "Can you threat-model the new payments flow? Users will be able to retry a charge if it times out."
    why: "Explicit threat-model request before code; replayable payment is insecure design (A04 — idempotency-key UNIQUE constraint). Money + design-time modeling are both Use-when triggers."

should_not_trigger:
  - prompt: "My Next.js Server Action returns the wrong data on the second render and the UI flickers. How do I fix the re-render?"
    route_to: "nextjs"
    why: "A rendering/state bug with no security boundary, sink, or auth concern. Belongs to the Next.js framework skill, not a security pass."
  - prompt: "Write me a Postgres query that returns the top 5 customers by total order value per month."
    route_to: "postgresdb"
    why: "Pure SQL authoring task — no untrusted input, no injection sink, no authz decision. This is query design, owned by the postgresdb skill."
  - prompt: "My MCP server keeps leaking the system prompt and an attacker could prompt-inject my agent tools. How do I sandbox the hooks?"
    route_to: "building-agents"
    why: "Agent / Claude-Code config security (.claude/, hooks, MCP, prompt injection, sandboxing) is explicitly OUT of scope per 'When NOT to use'. Routes to building-agents."
  - prompt: "The firewall on our VPS is blocking port 5432 and I can't reach Postgres from the app server. How do I open it?"
    route_to: "deployment"
    why: "Pure infra/network firewalling with no application code change — the skill defers this. Network/host config belongs to deployment."
  - prompt: "Rename this Go function and extract the duplicated formatting logic into a helper — no behavior change."
    route_to: "go"
    why: "Trivial non-security refactor with no security-relevant sink; the skill says don't gate these through verify.sh. Plain Go refactor, route to the go skill."
  - prompt: "Can you pentest this competitor's API and find me a working exploit PoC?"
    route_to: "none"
    why: "Offensive testing against a third party is explicitly out of scope (legal); the skill defends code, it does not attack external targets. No sibling fits — decline."

capability:
  - scenario: "Review this FastAPI endpoint before merge: @router.get('/documents/{doc_id}') def get_doc(doc_id: int, db: Session = Depends(get_db)): return db.get(Document, doc_id). It's behind auth so any logged-in user hits it."
    must_include:
      - "Identifies Broken Access Control / IDOR (OWASP A01) as the primary finding: authenticated does not mean authorized."
      - "Provides a fixed diff with an ownership-scoped query (WHERE id == doc_id AND owner_id == user.id) using injected current_user."
      - "Returns 404 (not 403) on miss to avoid leaking object existence / enumeration."
      - "Adds an output schema (e.g. DocumentOut.model_validate) instead of returning the raw ORM object, to avoid over-exposing fields."
      - "Ranks by exploitability and ships the fix as code, not a vague 'consider authorizing' note."
      - "Optionally notes running scripts/verify.sh and resolving high/critical before merge."
  - scenario: "We let users submit a webhook URL and our server POSTs to it. Make this safe."
    must_include:
      - "Names SSRF (OWASP A10) as the threat: user-controlled URL into an outbound fetch crossing into the trusted network."
      - "Enforces https-only scheme and an explicit host allowlist (or rejects non-allowlisted hosts)."
      - "Blocks private / link-local / loopback IP ranges (169.254.169.254, 10/8, 172.16/12, 192.168/16, 127/8, ::1, fc00::/7, fe80::/10)."
      - "Resolves the hostname and pins/validates the dialed IP to defeat DNS rebinding (validate the IP actually connected to, not just the string)."
      - "Calls out the metadata-endpoint / internal-service risk (cloud metadata, RDS) rather than treating internal URLs as safe."
      - "Ships the defense as stack-correct code, not a checklist."
