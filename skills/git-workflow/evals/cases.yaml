skill: git-workflow

should_trigger:
  - prompt: "Is this commit message conventional? 'fixed the login bug'"
    why: Core Conventional Commits grammar check — past tense, no type, capitalized; the skill rewrites it.
  - prompt: "Should I rebase or merge this feature branch before opening the PR?"
    why: History-strategy decision — rebase private / merge shared — owned by the hygiene decision table.
  - prompt: "My git log is full of wip commits, clean it up before review"
    why: Non-obvious phrasing; routes to squash/interactive-rebase to collapse scratch commits.
  - prompt: "What version should this release be — we added a new endpoint and a breaking config change?"
    why: SemVer bump derived from the commit log; breaking change forces MAJOR.
  - prompt: "Limpia el historial y deja los commits en formato convencional antes del PR"
    why: Spanish trigger covering history cleanup plus conventional-commit formatting.
  - prompt: "Name a branch for the OAuth PKCE work"
    why: Branch-naming convention — feat/ prefix plus kebab slug from intent.
  - prompt: "Tag v2.1.0 and write the release notes"
    why: Release mechanics — annotated tag plus gh release create --generate-notes.

should_not_trigger:
  - prompt: "I'm done and verified, land this work into main"
    route_to: ship
    why: The land/merge decision and pre-ship safety checklist are ship's phase, not the conventions layer.
  - prompt: "Set up an isolated checkout so I don't dirty main before I start coding"
    route_to: worktrees
    why: Workspace isolation up front, before any code is touched.
  - prompt: "Write a GitHub Actions workflow that publishes a release on tag push"
    route_to: deployment
    why: CI/CD release automation, not the manual/local release act.
  - prompt: "Review this diff for bugs before we merge"
    route_to: review
    why: Adversarial diff reading, not git mechanics.
  - prompt: "Containerize the app and deploy it to Coolify"
    route_to: deployment
    why: Build and deploy mechanics to a platform.

capability:
  - scenario: >
      A private feature branch has 4 messy commits: one adds a feature, one removes a deprecated
      config flag (a breaking change), and two are "wip". Produce (a) a clean conventional-commit
      plan, (b) the correct semver bump for the next release, and (c) the gh release create command.
    must_include:
      - Collapses the two "wip" commits via squash or fixup and explains why (one meaningful entry in main).
      - Identifies a feat commit and a BREAKING CHANGE footer written in uppercase.
      - Bump is MAJOR because of the breaking change, with a tag of the form vX.0.0.
      - Uses gh release create vX.0.0 --generate-notes (or an equivalent that produces notes).
      - Uses git push --force-with-lease (not bare --force) for the post-rebase push.
      - Does NOT add a Claude Co-Authored-By or "Generated with" footer; authorship stays Eric.
