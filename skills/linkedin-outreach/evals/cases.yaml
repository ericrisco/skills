skill: linkedin-outreach

should_trigger:
  - prompt: "Set up a Sales Navigator saved search for Series-B fintech RevOps leaders and alert me on job changes."
    why: Core targeting phase — saved search + trigger alerts, the spine of the loop.
  - prompt: "My LinkedIn acceptance rate is about 15%. How do I run my connection requests so people actually accept?"
    why: Non-obvious — names a metric, not the skill; routes to engagement-before-connect + the weekly budget rules.
  - prompt: "Build me a 30-minute-a-day social-selling routine that turns LinkedIn into pipeline."
    why: The loop plus the daily checklist — the motion, not any message.
  - prompt: "Turn everyone who engaged with my last post into a conversation, and log who I've touched."
    why: Engagement-to-conversation play plus the 02-DOCS ledger.
  - prompt: "Someone just viewed my profile and another person liked my post — what's the play?"
    why: Non-obvious signal-to-play question; the choreography, never the finished copy.
  - prompt: "Munta'm una rutina de social selling a LinkedIn i porta'm un registre dels contactes."
    why: Catalan — the loop plus the ledger.

should_not_trigger:
  - prompt: "Write the actual connection note and the DM bump for these 5 prospects."
    route_to: cold-outreach
    why: The message copy and its send cadence, not the motion — the sharpest near-miss.
  - prompt: "Find me 200 SaaS CTOs with verified profiles to target."
    route_to: lead-gen
    why: Sourcing and scoring the raw prospect list.
  - prompt: "A prospect replied 'interested' — set the deal stage and my follow-up tasks."
    route_to: sales-pipeline
    why: Running the deal after the reply.
  - prompt: "Write and schedule my next 4 LinkedIn posts."
    route_to: linkedin-content
    why: Publishing content, not 1:1 outreach.
  - prompt: "Define my overall LinkedIn positioning and growth strategy for the year."
    route_to: linkedin-strategy
    why: Brand growth/positioning, not the outreach loop.

capability:
  - scenario: "I sell a $20k analytics tool to ecommerce ops leads. Set up my LinkedIn social-selling motion end to end."
    must_include:
      - Defines a Sales Navigator saved search with concrete filters plus trigger alerts (job change / funding / recent post).
      - Specifies the engagement-before-connect ritual (view + one genuine comment/like 1–2 days prior) and the acceptance lift it buys.
      - Gives a note-or-no-note decision tied to the acceptance-vs-reply goal (the note paradox).
      - States the weekly connection-request budget and at least one health rule (rolling cap, pause if acceptance drops).
      - Defines the 02-DOCS ledger path and its columns.
      - Delegates the actual message copy to cold-outreach.
      - Names the pipeline handoff point (booked call / warm intro → sales-pipeline).
